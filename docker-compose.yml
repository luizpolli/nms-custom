services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: nms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nms_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nms-net

  redis:
    image: redis:7-alpine
    container_name: nms-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nms-net

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      START_EMBEDDED_WORKERS: "${START_EMBEDDED_WORKERS:-false}"
      HTTPS_ENABLED: "${HTTPS_ENABLED:-true}"
      HTTPS_REDIRECT_ENABLED: "${HTTPS_REDIRECT_ENABLED:-true}"
      TLS_MIN_VERSION: "${TLS_MIN_VERSION:-TLSv1.3}"
      TLS_CERT_FILE: "${TLS_CERT_FILE:-/certs/server.crt}"
      TLS_KEY_FILE: "${TLS_KEY_FILE:-/certs/server.key}"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - tls_certs:/certs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nms-net

  worker-poller:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-worker-poller
    restart: unless-stopped
    command: python -m app.workers.run monitoring-policies
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nms-net

  worker-topology:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-worker-topology
    restart: unless-stopped
    command: python -m app.workers.run topology
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nms-net

  worker-report:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-worker-report
    restart: unless-stopped
    command: python -m app.workers.run reports
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nms-net

  trap-receiver:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-trap-receiver
    restart: unless-stopped
    command: python -m app.workers.run trap-receiver
    env_file:
      - .env
    environment:
      TRAP_PORT: "${TRAP_PORT:-1162}"
    ports:
      - "${TRAP_PORT:-1162}:${TRAP_PORT:-1162}/udp"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nms-net

  syslog-receiver:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-syslog-receiver
    restart: unless-stopped
    command: python -m app.workers.run syslog-receiver
    env_file:
      - .env
    ports:
      - "${SYSLOG_BIND_PORT:-5514}:${SYSLOG_BIND_PORT:-5514}/udp"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nms-net

  telemetry-receiver:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-telemetry-receiver
    restart: unless-stopped
    command: python -m app.workers.run telemetry-receiver
    env_file:
      - .env
    environment:
      TELEMETRY_BIND_PORT: "${TELEMETRY_BIND_PORT:-57400}"
      TELEMETRY_TRANSPORT: "${TELEMETRY_TRANSPORT:-gnmi}"
    ports:
      - "${TELEMETRY_BIND_PORT:-57400}:${TELEMETRY_BIND_PORT:-57400}/tcp"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nms-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nms-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      HTTPS_ENABLED: "${HTTPS_ENABLED:-true}"
      TLS_CERT_FILE: "${TLS_CERT_FILE:-/certs/server.crt}"
      TLS_KEY_FILE: "${TLS_KEY_FILE:-/certs/server.key}"
      VITE_API_TARGET: "https://app:8000"
      VITE_WS_TARGET: "wss://app:8000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - tls_certs:/certs:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - nms-net

volumes:
  pg_data:
  redis_data:
  tls_certs:

networks:
  nms-net:
    driver: bridge
