# ---------------------------------------------------------------------------
# NMS-Custom · Docker Compose
# ---------------------------------------------------------------------------
# Security hardening conventions applied here:
#   • All backend/worker/receiver services run as UID/GID 1000 (appuser)
#     matching the non-root user created in backend/Dockerfile.
#   • read_only: true — container root filesystem is immutable; only named
#     volumes and the /tmp tmpfs remain writable at runtime.
#   • cap_drop: [ALL] — all Linux capabilities dropped by default.
#     No capability add-backs required because all listener ports >1024.
#   • security_opt: no-new-privileges — prevents setuid escalation.
#   • tmpfs entries for /tmp and /run give runtime scratch space without
#     persistent writes.
#
# Development note: the ./backend:/app bind-mount gives hot-reload.
# In a production image-based deploy, remove those bind-mounts so the
# container uses its baked-in code and the read-only FS is fully enforced.
# ---------------------------------------------------------------------------

# --- Shared security profile for all Python backend services ---------------
x-backend-security: &backend-security
  user: "1000:1000"
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  tmpfs:
    - /tmp:mode=1777,size=64m
    - /run:mode=0755,size=8m

services:
  # Docker socket proxy — gives nms-app just enough Docker API access to
  # list/restart the known containers (System Administration panel) without
  # ever exposing the raw socket (= host root) to that container. Only
  # CONTAINERS/PING/POST/RESTARTS are allowed; everything else (EXEC, VOLUMES,
  # IMAGES, NETWORKS, SWARM, BUILD, ...) is denied.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: nms-docker-proxy
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:mode=1777,size=8m
      - /run:mode=0755,size=8m
      - /var/lib/haproxy:mode=0755,size=8m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: "1"
      POST: "1"
      ALLOW_RESTARTS: "1"
      PING: "1"
      EVENTS: "0"
      VERSION: "0"
      INFO: "0"
      AUTH: "0"
      SECRETS: "0"
      BUILD: "0"
      COMMIT: "0"
      CONFIGS: "0"
      DISTRIBUTION: "0"
      EXEC: "0"
      GRPC: "0"
      IMAGES: "0"
      NETWORKS: "0"
      NODES: "0"
      PLUGINS: "0"
      SERVICES: "0"
      SESSION: "0"
      SWARM: "0"
      SYSTEM: "0"
      TASKS: "0"
      VOLUMES: "0"
    networks:
      - nms-net

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: nms-postgres
    restart: unless-stopped
    # postgres internal user manages its own privilege drop; we add only the
    # no-new-privileges guardrail to avoid breaking TimescaleDB init scripts.
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nms_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nms-net

  redis:
    image: redis:7-alpine
    container_name: nms-redis
    restart: unless-stopped
    # redis:7-alpine ships a 'redis' user (UID 999). Drop all caps — Redis
    # needs no privileges beyond basic TCP socket operations.
    user: "999:999"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nms-net

  app:
    <<: *backend-security
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      START_EMBEDDED_WORKERS: "${START_EMBEDDED_WORKERS:-false}"
      HTTPS_ENABLED: "${HTTPS_ENABLED:-true}"
      HTTPS_REDIRECT_ENABLED: "${HTTPS_REDIRECT_ENABLED:-true}"
      TLS_MIN_VERSION: "${TLS_MIN_VERSION:-TLSv1.3}"
      TLS_CERT_FILE: "${TLS_CERT_FILE:-/certs/server.crt}"
      TLS_KEY_FILE: "${TLS_KEY_FILE:-/certs/server.key}"
      DOCKER_PROXY_URL: "${DOCKER_PROXY_URL:-http://docker-proxy:2375}"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Dev bind-mount — remove in production image-based deployments.
      - ./backend:/app
      # TLS certs volume; writable so startup cert-gen scripts can populate it.
      - tls_certs:/certs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nms-net

  worker-poller:
    <<: *backend-security
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-worker-poller
    restart: unless-stopped
    command: python -m app.workers.run monitoring-policies
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nms-net

  worker-topology:
    <<: *backend-security
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-worker-topology
    restart: unless-stopped
    command: python -m app.workers.run topology
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nms-net

  worker-report:
    <<: *backend-security
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-worker-report
    restart: unless-stopped
    command: python -m app.workers.run reports
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nms-net

  worker-alarm:
    <<: *backend-security
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-worker-alarm
    restart: unless-stopped
    command: python -m app.workers.run worker-alarm
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nms-net

  worker-discovery:
    <<: *backend-security
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-worker-discovery
    restart: unless-stopped
    command: python -m app.workers.run worker-discovery
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nms-net

  worker-telemetry:
    <<: *backend-security
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-worker-telemetry
    restart: unless-stopped
    command: python -m app.workers.run worker-telemetry
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nms-net

  trap-receiver:
    <<: *backend-security
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-trap-receiver
    restart: unless-stopped
    command: python -m app.workers.run trap-receiver
    env_file:
      - .env
    environment:
      TRAP_PORT: "${TRAP_PORT:-1162}"
    ports:
      # UDP port 1162 > 1024; NET_BIND_SERVICE not required.
      - "${TRAP_PORT:-1162}:${TRAP_PORT:-1162}/udp"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nms-net

  syslog-receiver:
    <<: *backend-security
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-syslog-receiver
    restart: unless-stopped
    command: python -m app.workers.run syslog-receiver
    env_file:
      - .env
    ports:
      # UDP port 5514 > 1024; NET_BIND_SERVICE not required.
      - "${SYSLOG_BIND_PORT:-5514}:${SYSLOG_BIND_PORT:-5514}/udp"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nms-net

  telemetry-receiver:
    <<: *backend-security
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-telemetry-receiver
    restart: unless-stopped
    command: python -m app.workers.run telemetry-receiver
    env_file:
      - .env
    environment:
      TELEMETRY_BIND_PORT: "${TELEMETRY_BIND_PORT:-57400}"
      TELEMETRY_TRANSPORT: "${TELEMETRY_TRANSPORT:-gnmi-json}"
    ports:
      # TCP port 57400 > 1024; NET_BIND_SERVICE not required.
      - "${TELEMETRY_BIND_PORT:-57400}:${TELEMETRY_BIND_PORT:-57400}/tcp"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nms-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nms-frontend
    restart: unless-stopped
    # frontend uses 'node' user (UID 1000) in node:20-alpine.
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # read_only omitted for frontend dev server: Vite writes hot-reload artefacts
    # to paths outside /app. Enable once switching to a production static-file server.
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      HTTPS_ENABLED: "${HTTPS_ENABLED:-true}"
      TLS_CERT_FILE: "${TLS_CERT_FILE:-/certs/server.crt}"
      TLS_KEY_FILE: "${TLS_KEY_FILE:-/certs/server.key}"
      VITE_API_TARGET: "https://app:8000"
      VITE_WS_TARGET: "wss://app:8000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - tls_certs:/certs:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - nms-net

  # -----------------------------------------------------------------
  # Self-monitoring stack (P2.11) — Prometheus + Alertmanager + Grafana.
  # All three live in the `monitoring` Compose profile so they only start
  # with `docker compose --profile monitoring up -d`. They scrape the
  # backend `app` service /metrics endpoint on the internal nms-net.
  # Hardened to match the rest of the stack: non-root UID, read-only root
  # filesystem, all caps dropped, no-new-privileges, tmpfs scratch.
  # -----------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: nms-prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    user: "65534:65534"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:mode=1777,size=32m
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prom_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nms-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: nms-alertmanager
    profiles: ["monitoring"]
    restart: unless-stopped
    user: "65534:65534"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:mode=1777,size=16m
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nms-net

  grafana:
    image: grafana/grafana:latest
    container_name: nms-grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    user: "472:472"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:mode=1777,size=32m
      - /var/run:mode=0755,size=8m
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: "/etc/grafana/provisioning"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nms-net

volumes:
  pg_data:
  redis_data:
  tls_certs:
  prom_data:
  alertmanager_data:
  grafana_data:

networks:
  nms-net:
    driver: bridge
