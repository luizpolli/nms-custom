services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: nms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nms_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nms-net

  redis:
    image: redis:7-alpine
    container_name: nms-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nms-net

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nms-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nms-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nms-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - app
    networks:
      - nms-net

volumes:
  pg_data:
  redis_data:

networks:
  nms-net:
    driver: bridge
