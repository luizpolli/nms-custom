image:
  backend: nms-custom-backend:latest
  frontend: nms-custom-frontend:latest
  pullPolicy: IfNotPresent

replicaCount:
  api: 1
  frontend: 1
  poller: 1
  topology: 1
  report: 1
  telemetryReceiver: 1
  alarmWorker: 1
  discoveryWorker: 1
  telemetryWorker: 1

config:
  appEnv: production
  startEmbeddedWorkers: "false"
  httpsEnabled: "true"
  apiAuthEnabled: "true"
  workerShardCount: "1"
  workerMaxConcurrency: "8"
  telemetryTransport: gnmi
  eventStreamName: nms:events
  eventConsumerGroupPrefix: nms
  eventConsumerBlockMs: "1000"
  eventConsumerStaleMs: "60000"

postgres:
  enabled: true
  image: timescale/timescaledb:latest-pg16
  storage: 20Gi
  user: nms
  database: nms
  passwordSecret: nms-postgres
  existingSecret: ""
  externalHost: ""

redis:
  enabled: true
  image: redis:7-alpine
  externalHost: ""

secrets:
  # Use an existing Kubernetes Secret for app env vars such as API_KEY,
  # SECRET_KEY, POSTGRES_PASSWORD, TLS paths, provider credentials, etc.
  existingSecret: ""
  envFrom: []
  externalSecret:
    enabled: false
    apiVersion: external-secrets.io/v1beta1
    kind: ExternalSecret
    secretStoreRef:
      name: ""
      kind: ClusterSecretStore
    refreshInterval: 1h
    data: []
    dataFrom: []

# Top-level shorthand for External Secrets Operator — mirrors secrets.externalSecret
# but uses the naming from the P1 spec for ergonomic prod values overrides.
externalSecrets:
  enabled: false
  refreshInterval: "1h"
  secretStoreRef:
    name: ""
    kind: ClusterSecretStore
  # credential classes rendered as separate ExternalSecret objects
  credentialClasses:
    db:
      enabled: true
      remoteRef:
        key: nms/db
    smtp:
      enabled: true
      remoteRef:
        key: nms/smtp
    apiKeys:
      enabled: true
      remoteRef:
        key: nms/api-keys

ingress:
  enabled: false
  className: ""
  annotations: {}
  # cert-manager.io/cluster-issuer annotation is injected when tls.certManager.enabled=true
  certManager:
    enabled: false
    clusterIssuer: letsencrypt-prod
  host: nms.example.com
  tls:
    enabled: false
    secretName: nms-custom-tls
  hosts:
    - host: nms.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: api

networkPolicy:
  enabled: false
  ingress:
    # matchLabels for the ingress-controller namespace (e.g. ingress-nginx)
    ingressControllerNamespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: ingress-nginx
    allowNamespaceSelector: {}
  egress:
    enabled: true
    allowDns: true
    # CIDR or pod-selector rules for DB, Redis, SMTP — override in prod values
    dbCIDR: ""
    redisCIDR: ""
    smtpHost: ""
    smtpPort: 587
    extra: []

autoscaling:
  api:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  frontend:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  workers:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  receiver:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

pdb:
  enabled: false
  minAvailable: 1

service:
  apiPort: 8000
  frontendPort: 5173
  telemetryPort: 57400

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
