image:
  backend: nms-custom-backend:latest
  frontend: nms-custom-frontend:latest
  pullPolicy: IfNotPresent

replicaCount:
  api: 2
  frontend: 2
  poller: 1
  topology: 1
  report: 1
  telemetryReceiver: 2
  alarmWorker: 2
  discoveryWorker: 2
  telemetryWorker: 2

config:
  appEnv: production
  startEmbeddedWorkers: "false"
  httpsEnabled: "true"
  apiAuthEnabled: "true"
  workerShardCount: "1"
  workerMaxConcurrency: "8"
  telemetryTransport: gnmi
  # Event bus backend — "redis" (default) or "kafka"
  eventBusBackend: "redis"
  eventStreamName: nms:events
  eventConsumerGroupPrefix: nms
  eventConsumerBlockMs: "1000"
  eventConsumerStaleMs: "60000"
  # Kafka (only used when eventBusBackend=kafka)
  kafkaBrokers: ""
  kafkaTopicPrefix: nms
  kafkaSecurityProtocol: PLAINTEXT
  kafkaSaslMechanism: ""

# Optional bundled Kafka subchart (disabled by default — operate Kafka separately
# or via your cloud provider in production). When enabled, this stack ships a
# 3-broker KRaft cluster suitable for medium workloads.
kafka:
  enabled: false
  brokers: 3
  replicationFactor: 3
  minInsyncReplicas: 2
  storage: 50Gi
  # If you provide an existing broker list, leave .enabled=false and set
  # config.kafkaBrokers to the external endpoint(s).

postgres:
  enabled: true
  image: timescale/timescaledb:latest-pg16
  storage: 20Gi
  user: nms
  database: nms
  passwordSecret: nms-postgres
  existingSecret: ""
  externalHost: ""

redis:
  enabled: true
  image: redis:7-alpine
  externalHost: ""

secrets:
  # Use an existing Kubernetes Secret for app env vars such as API_KEY,
  # SECRET_KEY, POSTGRES_PASSWORD, TLS paths, provider credentials, etc.
  existingSecret: ""
  envFrom: []
  externalSecret:
    enabled: false
    apiVersion: external-secrets.io/v1beta1
    kind: ExternalSecret
    secretStoreRef:
      name: ""
      kind: ClusterSecretStore
    refreshInterval: 1h
    data: []
    dataFrom: []

# Top-level shorthand for External Secrets Operator — mirrors secrets.externalSecret
# but uses the naming from the P1 spec for ergonomic prod values overrides.
externalSecrets:
  enabled: false
  refreshInterval: "1h"
  secretStoreRef:
    name: ""
    kind: ClusterSecretStore
  # credential classes rendered as separate ExternalSecret objects
  credentialClasses:
    db:
      enabled: true
      remoteRef:
        key: nms/db
    smtp:
      enabled: true
      remoteRef:
        key: nms/smtp
    apiKeys:
      enabled: true
      remoteRef:
        key: nms/api-keys

ingress:
  enabled: false
  className: ""
  annotations: {}
  # cert-manager.io/cluster-issuer annotation is injected when tls.certManager.enabled=true
  certManager:
    enabled: false
    clusterIssuer: letsencrypt-prod
  host: nms.example.com
  tls:
    enabled: false
    secretName: nms-custom-tls
  hosts:
    - host: nms.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: api

networkPolicy:
  enabled: false
  ingress:
    # matchLabels for the ingress-controller namespace (e.g. ingress-nginx)
    ingressControllerNamespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: ingress-nginx
    allowNamespaceSelector: {}
  egress:
    enabled: true
    allowDns: true
    # CIDR or pod-selector rules for DB, Redis, SMTP — override in prod values
    dbCIDR: ""
    redisCIDR: ""
    smtpHost: ""
    smtpPort: 587
    extra: []

autoscaling:
  api:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  frontend:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  workers:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  receiver:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

pdb:
  enabled: false
  minAvailable: 1

service:
  apiPort: 8000
  frontendPort: 5173
  telemetryPort: 57400

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

# High-availability scheduling — pod anti-affinity + topology spread keep
# replicas distributed across nodes and AZs. Defaults are "soft" (preferred)
# so single-AZ clusters still schedule; flip to required in values-ha.yaml.
ha:
  enabled: true
  # "soft" = preferredDuringSchedulingIgnoredDuringExecution
  # "hard" = requiredDuringSchedulingIgnoredDuringExecution
  podAntiAffinityMode: soft
  topologyKey: topology.kubernetes.io/zone
  topologySpread:
    enabled: true
    maxSkew: 1
    # "ScheduleAnyway" tolerates small clusters; HA values overrides to "DoNotSchedule"
    whenUnsatisfiable: ScheduleAnyway

probes:
  api:
    liveness:
      path: /healthz
      initialDelaySeconds: 20
      periodSeconds: 15
      timeoutSeconds: 3
      failureThreshold: 3
    readiness:
      path: /readyz
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
  frontend:
    liveness:
      path: /
      initialDelaySeconds: 10
      periodSeconds: 30
    readiness:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10

terminationGracePeriodSeconds: 30
