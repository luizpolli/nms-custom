apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nms-custom.name" . }}
  labels:
    {{- include "nms-custom.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "nms-custom.name" . }}
rules:
  # Least-privilege placeholder: app pods do not need Kubernetes API access yet.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "nms-custom.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "nms-custom.name" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "nms-custom.name" . }}
