apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nms-custom.name" . }}-config
  labels:
    {{- include "nms-custom.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.config.appEnv | quote }}
  START_EMBEDDED_WORKERS: {{ .Values.config.startEmbeddedWorkers | quote }}
  HTTPS_ENABLED: {{ .Values.config.httpsEnabled | quote }}
  API_AUTH_ENABLED: {{ .Values.config.apiAuthEnabled | quote }}
  WORKER_SHARD_COUNT: {{ .Values.config.workerShardCount | quote }}
  WORKER_MAX_CONCURRENCY: {{ .Values.config.workerMaxConcurrency | quote }}
  TELEMETRY_TRANSPORT: {{ .Values.config.telemetryTransport | quote }}
  POSTGRES_HOST: {{ default (printf "%s-postgres" (include "nms-custom.name" .)) .Values.postgres.externalHost | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  REDIS_HOST: {{ default (printf "%s-redis" (include "nms-custom.name" .)) .Values.redis.externalHost | quote }}
