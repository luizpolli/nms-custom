# ExternalSecret — rendered per credential class when externalSecrets.enabled=true
# Falls back to a plain Secret template (secrets.existingSecret) when disabled.
{{- if .Values.externalSecrets.enabled }}
{{- $storeRef := required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" .Values.externalSecrets.secretStoreRef.name }}
{{- range $className, $class := .Values.externalSecrets.credentialClasses }}
{{- if $class.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "nms-custom.name" $ }}-ext-{{ $className | lower }}
  labels:
    {{- include "nms-custom.labels" $ | nindent 4 }}
    app.kubernetes.io/component: external-secret-{{ $className | lower }}
spec:
  refreshInterval: {{ $.Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ $storeRef | quote }}
    kind: {{ $.Values.externalSecrets.secretStoreRef.kind | default "ClusterSecretStore" | quote }}
  target:
    name: {{ include "nms-custom.name" $ }}-{{ $className | lower }}-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ $class.remoteRef.key | quote }}
{{- end }}
{{- end }}
{{- else if .Values.secrets.externalSecret.enabled }}
{{- /* Legacy path: single ExternalSecret via secrets.externalSecret.* */}}
---
apiVersion: {{ .Values.secrets.externalSecret.apiVersion }}
kind: {{ .Values.secrets.externalSecret.kind }}
metadata:
  name: {{ include "nms-custom.name" . }}-external-secret
  labels:
    {{- include "nms-custom.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "secrets.externalSecret.secretStoreRef.name is required when externalSecret.enabled=true" .Values.secrets.externalSecret.secretStoreRef.name | quote }}
    kind: {{ .Values.secrets.externalSecret.secretStoreRef.kind | default "ClusterSecretStore" | quote }}
  target:
    name: {{ default (printf "%s-app-secrets" (include "nms-custom.name" .)) .Values.secrets.existingSecret | quote }}
    creationPolicy: Owner
  {{- with .Values.secrets.externalSecret.data }}
  data:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.secrets.externalSecret.dataFrom }}
  dataFrom:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
