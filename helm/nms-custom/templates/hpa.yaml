# HPA — one per scalable workload; memory metric added alongside CPU
{{- define "nms-custom.hpa" -}}
{{- $name := index . 0 -}}
{{- $cfg := index . 1 -}}
{{- $releaseName := index . 2 -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nms-custom-{{ $name }}
  labels:
    app.kubernetes.io/name: nms-custom
    app.kubernetes.io/instance: {{ $releaseName }}
    app.kubernetes.io/component: {{ $name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nms-custom-{{ $name }}
  minReplicas: {{ $cfg.minReplicas }}
  maxReplicas: {{ $cfg.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $cfg.targetCPUUtilizationPercentage }}
    {{- if $cfg.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $cfg.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end -}}

{{- if .Values.autoscaling.api.enabled }}
{{ include "nms-custom.hpa" (list "api" .Values.autoscaling.api .Release.Name) }}
---
{{- end }}
{{- if .Values.autoscaling.frontend.enabled }}
{{ include "nms-custom.hpa" (list "frontend" .Values.autoscaling.frontend .Release.Name) }}
---
{{- end }}
{{- if .Values.autoscaling.receiver.enabled }}
{{ include "nms-custom.hpa" (list "telemetry-receiver" .Values.autoscaling.receiver .Release.Name) }}
---
{{- end }}
{{- if .Values.autoscaling.workers.enabled }}
{{- range $workerName := list "worker-poller" "worker-topology" "worker-report" "worker-alarm" "worker-discovery" "worker-telemetry" }}
{{ include "nms-custom.hpa" (list $workerName $.Values.autoscaling.workers $.Release.Name) }}
---
{{- end }}
{{- end }}
