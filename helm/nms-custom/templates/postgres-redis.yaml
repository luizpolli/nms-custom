{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nms-custom.name" . }}-postgres
spec:
  serviceName: {{ include "nms-custom.name" . }}-postgres
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/component: postgres, app.kubernetes.io/instance: {{ .Release.Name }}}
  template:
    metadata:
      labels: {app.kubernetes.io/component: postgres, app.kubernetes.io/instance: {{ .Release.Name }}}
    spec:
      {{- with .Values.postgresSecurityContext.pod }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          {{- with .Values.postgresSecurityContext.container }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - {name: POSTGRES_DB, value: {{ .Values.postgres.database | quote }}}
            - {name: POSTGRES_USER, value: {{ .Values.postgres.user | quote }}}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: {{ .Values.postgres.passwordSecret }}, key: password}}
          ports: [{containerPort: 5432}]
          volumeMounts: [{name: data, mountPath: /var/lib/postgresql/data}]
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: {requests: {storage: {{ .Values.postgres.storage }}}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nms-custom.name" . }}-postgres
spec:
  selector: {app.kubernetes.io/component: postgres, app.kubernetes.io/instance: {{ .Release.Name }}}
  ports: [{name: postgres, port: 5432, targetPort: 5432}]
{{- end }}
---
{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nms-custom.name" . }}-redis
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/component: redis, app.kubernetes.io/instance: {{ .Release.Name }}}
  template:
    metadata:
      labels: {app.kubernetes.io/component: redis, app.kubernetes.io/instance: {{ .Release.Name }}}
    spec:
      {{- with .Values.redisSecurityContext.pod }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          {{- with .Values.redisSecurityContext.container }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports: [{containerPort: 6379}]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nms-custom.name" . }}-redis
spec:
  selector: {app.kubernetes.io/component: redis, app.kubernetes.io/instance: {{ .Release.Name }}}
  ports: [{name: redis, port: 6379, targetPort: 6379}]
{{- end }}
