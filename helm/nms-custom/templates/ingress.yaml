# Ingress — cert-manager annotation injected when ingress.certManager.enabled=true
{{- if .Values.ingress.enabled -}}
{{- $annotations := .Values.ingress.annotations | default dict }}
{{- if .Values.ingress.certManager.enabled }}
{{- $_ := set $annotations "cert-manager.io/cluster-issuer" .Values.ingress.certManager.clusterIssuer }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nms-custom.name" . }}
  labels:
    {{- include "nms-custom.labels" . | nindent 4 }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - secretName: {{ .Values.ingress.tls.secretName | quote }}
      hosts:
        - {{ .Values.ingress.host | quote }}
  {{- else if .Values.ingress.tls }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path | quote }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "nms-custom.name" $ }}-{{ .service | default "frontend" }}
                port:
                  number: {{ ternary $.Values.service.apiPort $.Values.service.frontendPort (eq (.service | default "frontend") "api") }}
          {{- end }}
    {{- end }}
{{- end }}
