# Production overrides — all hardening features on, multi-replica defaults
image:
  pullPolicy: Always

# Production HA replicas — sized for "Medium" (500–2 000 devices).
# For Large/XLarge use values-ha.yaml on top of this file.
replicaCount:
  api: 3
  frontend: 2
  poller: 2          # NOTE: must equal config.workerShardCount
  topology: 1
  report: 2
  telemetryReceiver: 2
  alarmWorker: 2
  discoveryWorker: 2 # singleton via Redis lease, ≥2 for HA standby
  telemetryWorker: 2

config:
  workerShardCount: "2"   # must match replicaCount.poller
  # Production-tuned event consumer cadence
  eventConsumerBlockMs: "500"
  eventConsumerStaleMs: "60000"

ingress:
  enabled: true
  className: nginx
  certManager:
    enabled: true
    clusterIssuer: letsencrypt-prod
  host: nms.example.com
  tls:
    enabled: true
    secretName: nms-custom-tls
  hosts:
    - host: nms.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: api

externalSecrets:
  enabled: true
  refreshInterval: "1h"
  secretStoreRef:
    name: prod-cluster-store
    kind: ClusterSecretStore
  credentialClasses:
    db:
      enabled: true
      remoteRef:
        key: nms/db
    smtp:
      enabled: true
      remoteRef:
        key: nms/smtp
    apiKeys:
      enabled: true
      remoteRef:
        key: nms/api-keys

networkPolicy:
  enabled: true
  ingress:
    ingressControllerNamespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: ingress-nginx
    allowNamespaceSelector: {}
  egress:
    enabled: true
    allowDns: true
    # Set to actual CIDR ranges in your cluster; left empty to avoid lint errors
    dbCIDR: ""
    redisCIDR: ""
    smtpHost: ""
    smtpPort: 587

autoscaling:
  api:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  frontend:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  workers:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  receiver:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ha:
  enabled: true
  podAntiAffinityMode: soft
  topologyKey: topology.kubernetes.io/zone
  topologySpread:
    enabled: true
    maxSkew: 1
    whenUnsatisfiable: ScheduleAnyway
