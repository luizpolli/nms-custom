<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50" role="img" aria-label="RJ45 copper port">
  <defs>
    <linearGradient id="rj45_metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#4b5563"/>
    </linearGradient>
  </defs>
  <!-- Outer housing -->
  <rect x="6" y="10" width="38" height="30" rx="2" fill="url(#rj45_metal)" stroke="#1f2937" stroke-width="1.5"/>
  <!-- Trapezoid jack opening -->
  <path d="M 12 14 L 38 14 L 36 20 L 36 32 L 38 36 L 12 36 L 14 32 L 14 20 Z"
        fill="#0b1320" stroke="#374151" stroke-width="1"/>
  <!-- Contact pins -->
  <g fill="#facc15">
    <rect x="16" y="22" width="1.5" height="6"/>
    <rect x="19" y="22" width="1.5" height="6"/>
    <rect x="22" y="22" width="1.5" height="6"/>
    <rect x="25" y="22" width="1.5" height="6"/>
    <rect x="28" y="22" width="1.5" height="6"/>
    <rect x="31" y="22" width="1.5" height="6"/>
    <rect x="34" y="22" width="1.5" height="6"/>
  </g>
  <!-- Status LEDs -->
  <circle cx="12" cy="44" r="1.5" fill="#22c55e"/>
  <circle cx="38" cy="44" r="1.5" fill="#f59e0b"/>
</svg>
