name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: nms
          POSTGRES_PASSWORD: nms_secret
          POSTGRES_DB: nms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nms"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://nms:nms_secret@localhost:5432/nms
          CREDENTIAL_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
        run: |
          mkdir -p pytest-reports
          python -m pytest tests --junitxml=pytest-reports/backend.xml -q
      - name: Compile backend modules
        run: python -m compileall -q app
      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: pytest-reports/

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Upload frontend build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Compose env file
        run: |
          if [ ! -f .env ]; then cp .env.example .env; fi
      - name: Validate Docker Compose config
        run: docker compose config --quiet

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: latest
      - name: Lint Helm chart (default values)
        run: helm lint helm/nms-custom
      - name: Lint Helm chart (dev values)
        run: helm lint helm/nms-custom -f helm/nms-custom/values-dev.yaml
      - name: Lint Helm chart (prod values)
        run: helm lint helm/nms-custom -f helm/nms-custom/values-prod.yaml
      - name: Render Helm chart (dev)
        run: helm template nms-custom helm/nms-custom -f helm/nms-custom/values-dev.yaml >/tmp/nms-custom-dev.yaml
      - name: Render Helm chart (prod)
        run: helm template nms-custom helm/nms-custom -f helm/nms-custom/values-prod.yaml >/tmp/nms-custom-prod.yaml
      - name: Verify Helm rendered templates are not empty
        run: |
          if [ ! -s /tmp/nms-custom-dev.yaml ]; then echo "Dev rendered template empty"; exit 1; fi
          if [ ! -s /tmp/nms-custom-prod.yaml ]; then echo "Prod rendered template empty"; exit 1; fi
          echo "Helm templates rendered successfully"
