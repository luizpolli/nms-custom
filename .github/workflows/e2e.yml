name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger so flaky-debug iterations don't need a code push.
  workflow_dispatch:

# Cancel superseded runs on the same ref to avoid double-billing CI minutes
# when contributors push multiple times in a row.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Bring up the full app stack (postgres+redis+backend+frontend) via
  # docker-compose, wait for healthchecks, then run the Playwright spec
  # against the published frontend port.
  #
  # We deliberately disable HTTPS for this job: certificate generation adds
  # minutes and Playwright would still be hitting localhost. Production
  # HTTPS posture is covered by the dedicated `security` workflow + the
  # `compose` job in `ci.yml`.
  # ---------------------------------------------------------------------------
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Install frontend deps FIRST, while ./frontend is still owned by
      # the GHA runner user. Once docker-compose's frontend container
      # mounts ./frontend:/app and writes into node_modules/ as UID 1000,
      # the runner user (UID 1001) loses write access and any subsequent
      # 'npm ci' on the host fails with EACCES under node_modules/.
      - name: Install frontend dependencies (before compose up)
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Prepare .env (HTTPS off for CI)
        run: |
          cp .env.example .env
          # Auth stays disabled by default (API_AUTH_ENABLED=false) so the
          # AlarmsPage renders as the implicit "local-dev" principal.
          # HTTPS_ENABLED is overridden via docker-compose.ci.yml below.
          echo 'CREDENTIAL_ENCRYPTION_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' >> .env

      - name: Start core stack (postgres, redis, app, frontend)
        # docker-compose.ci.yml turns TLS off across the app and rewires the
        # frontend's Vite proxy to http://app:8000 so the SPA doesn't try to
        # speak TLS to a plain-HTTP backend.
        #
        # We intentionally do NOT start the worker services, syslog/trap
        # receivers, telemetry collector, or the monitoring profile. The
        # alarms spec only needs the API and the SPA.
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            up -d --wait postgres redis app frontend

      - name: Wait for app + frontend to be reachable
        run: |
          # 'up --wait' already gave us a healthy backend. Frontend has no
          # healthcheck of its own, so confirm it's serving HTTP 200 before
          # handing off to Playwright.
          deadline=$((SECONDS + 120))
          while [ $SECONDS -lt $deadline ]; do
            be_status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/api/health || echo 000)
            fe_status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5173/ || echo 000)
            echo "backend_http=$be_status frontend_http=$fe_status"
            if [ "$be_status" = "200" ] && [ "$fe_status" = "200" ]; then
              echo "Stack ready."
              break
            fi
            sleep 3
          done
          if [ "$be_status" != "200" ] || [ "$fe_status" != "200" ]; then
            echo "::error::Stack did not become reachable within 120s"
            docker compose ps
            docker compose logs --tail=200 app frontend postgres redis
            exit 1
          fi

      - name: Smoke-test alarm-filter endpoints
        # Quick sanity check that the API actually returns 200s before we
        # hand off to Playwright. Cheap (~200ms) and catches
        # configuration regressions (missing tables, audit-path
        # permissions, etc.) with a clearer error than a Playwright
        # timeout. Also cleans up the smoke-test row it creates.
        run: |
          set -e
          status=$(curl -sS -o /dev/null -w '%{http_code}' http://localhost:8000/api/alarms/filters)
          test "$status" = "200" || { echo "GET /api/alarms/filters returned $status"; exit 1; }
          status=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H 'Content-Type: application/json' \
            -d '{"name":"smoke-test","is_public":false,"filters":{"severity":"major","state":"active","limit":100,"offset":0}}' \
            -X POST http://localhost:8000/api/alarms/filters)
          test "$status" = "200" -o "$status" = "201" || { echo "POST /api/alarms/filters returned $status"; exit 1; }

      - name: Install psql client for E2E seeding
        # The Playwright spec needs a psql binary to seed/teardown fixtures.
        # Using the host's apt cache keeps this fast; the alternative
        # (docker compose exec) requires the docker CLI inside the test
        # process, which works but ties the spec to the compose runtime.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client
          psql --version

      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          # Plain HTTP because HTTPS_ENABLED=false in the compose stack.
          E2E_BASE_URL: http://localhost:5173
          # Override the spec's psql invocation so it talks directly to the
          # published postgres port instead of going through
          # `docker compose exec`, which fails inside a different
          # working directory.
          E2E_PSQL_CMD: psql -h localhost -p 5432 -U nms -d nms
          PGPASSWORD: nms_secret
        run: npx playwright test --reporter=list,html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces / screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7

      - name: Capture compose logs on failure
        if: failure()
        run: |
          mkdir -p compose-logs
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps > compose-logs/ps.txt || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color --tail=500 > compose-logs/all.log || true

      - name: Upload compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: compose-logs/
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down --volumes --remove-orphans
