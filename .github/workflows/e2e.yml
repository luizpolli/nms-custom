name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger so flaky-debug iterations don't need a code push.
  workflow_dispatch:

# Cancel superseded runs on the same ref to avoid double-billing CI minutes
# when contributors push multiple times in a row.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Bring up the full app stack (postgres+redis+backend+frontend) via
  # docker-compose, wait for healthchecks, then run the Playwright spec
  # against the published frontend port.
  #
  # We deliberately disable HTTPS for this job: certificate generation adds
  # minutes and Playwright would still be hitting localhost. Production
  # HTTPS posture is covered by the dedicated `security` workflow + the
  # `compose` job in `ci.yml`.
  # ---------------------------------------------------------------------------
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Prepare .env (HTTPS off for CI)
        run: |
          cp .env.example .env
          # Disable HTTPS so the dev-cert bootstrap step is skipped and the
          # frontend Vite proxy talks to the backend over plain HTTP. Auth is
          # already disabled by default (API_AUTH_ENABLED=false) so the
          # AlarmsPage renders as the implicit "local-dev" principal.
          sed -i 's/^HTTPS_ENABLED=.*/HTTPS_ENABLED=false/' .env
          sed -i 's|^HTTPS_REDIRECT_ENABLED=.*|HTTPS_REDIRECT_ENABLED=false|' .env || true
          # Ensure the backend uses a non-empty encryption key. Same value the
          # other CI jobs use; safe for ephemeral test databases.
          echo 'CREDENTIAL_ENCRYPTION_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' >> .env

      - name: Start core stack (postgres, redis, app, frontend)
        # We intentionally do NOT start the worker services, syslog/trap
        # receivers, telemetry collector, or the monitoring profile. The
        # alarms spec only needs the API and the SPA.
        #
        # --wait would honour the container healthchecks, but the backend's
        # baked-in healthcheck curls https://localhost:8000/health and we run
        # the app over plain HTTP in CI. Detached start + custom polling
        # below sidesteps that mismatch without rewriting the production
        # healthcheck.
        run: docker compose up -d --no-deps postgres redis app frontend

      - name: Wait for app + frontend to be reachable
        run: |
          # Poll the actual ports from the host. We don't trust the container
          # healthcheck here because it's configured for HTTPS and we've
          # disabled TLS for this run (see the .env step above).
          deadline=$((SECONDS + 240))
          while [ $SECONDS -lt $deadline ]; do
            be_status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/health || echo 000)
            fe_status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5173/ || echo 000)
            echo "backend_http=$be_status frontend_http=$fe_status"
            if [ "$be_status" = "200" ] && [ "$fe_status" = "200" ]; then
              echo "Stack ready."
              exit 0
            fi
            sleep 3
          done
          echo "::error::Stack did not become reachable within 240s"
          docker compose ps
          docker compose logs --tail=200 app frontend postgres redis
          exit 1

      - name: Install psql client for E2E seeding
        # The Playwright spec needs a psql binary to seed/teardown fixtures.
        # Using the host's apt cache keeps this fast; the alternative
        # (docker compose exec) requires the docker CLI inside the test
        # process, which works but ties the spec to the compose runtime.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client
          psql --version

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          # Plain HTTP because HTTPS_ENABLED=false in the compose stack.
          E2E_BASE_URL: http://localhost:5173
          # Override the spec's psql invocation so it talks directly to the
          # published postgres port instead of going through
          # `docker compose exec`, which fails inside a different
          # working directory.
          E2E_PSQL_CMD: psql -h localhost -p 5432 -U nms -d nms
          PGPASSWORD: nms_secret
        run: npx playwright test --reporter=list,html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces / screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7

      - name: Capture compose logs on failure
        if: failure()
        run: |
          mkdir -p compose-logs
          docker compose ps > compose-logs/ps.txt || true
          docker compose logs --no-color --tail=500 > compose-logs/all.log || true

      - name: Upload compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: compose-logs/
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose down --volumes --remove-orphans
