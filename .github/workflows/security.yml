name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-security:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: nms
          POSTGRES_PASSWORD: nms_secret
          POSTGRES_DB: nms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nms"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies and scanners
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt bandit pip-audit
      - name: Import app and routers
        env:
          CREDENTIAL_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DATABASE_URL: sqlite+aiosqlite:///./ci-import.db
        run: |
          python - <<'PY'
          import importlib
          import app.main
          for mod in [
              'app.api.devices','app.api.credentials','app.api.performance','app.api.mibs',
              'app.api.discovery','app.api.commands','app.api.ios','app.api.topology',
              'app.api.alarms','app.api.reports','app.api.health','app.services.reports'
          ]:
              importlib.import_module(mod)
          PY
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://nms:nms_secret@localhost:5432/nms
          CREDENTIAL_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
        run: python -m pytest -q
      - name: Bandit SAST
        run: bandit -r app -x '*/__pycache__/*'
      - name: pip-audit
        run: pip-audit -r requirements.txt

  frontend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # Full audit (prod + dev). Vitest 4 + happy-dom 20 cleared the
      # previously-tolerated dev-only advisories, so we no longer need
      # to scope this to --omit=dev.
      - run: npm audit --audit-level=moderate

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
