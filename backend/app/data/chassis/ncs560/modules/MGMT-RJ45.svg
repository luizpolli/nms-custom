<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 76 26" width="76" height="26">
  <!-- Faceplate body -->
  <rect x="0" y="0" width="76" height="26" fill="#5a5a5a" rx="1"/>
  <rect x="1" y="1" width="74" height="24" fill="#6e6e6e" rx="1"/>

  <!-- RJ45 port opening (8P8C, centered in faceplate) -->
  <rect x="24" y="4" width="28" height="18" fill="#222" rx="1"/>
  <!-- Port inner recess -->
  <rect x="25" y="5" width="26" height="14" fill="#111"/>

  <!-- 8 contact pins -->
  <rect x="26.5" y="6"  width="2" height="8" fill="#d4a017"/>
  <rect x="29.5" y="6"  width="2" height="8" fill="#d4a017"/>
  <rect x="32.5" y="6"  width="2" height="8" fill="#d4a017"/>
  <rect x="35.5" y="6"  width="2" height="8" fill="#d4a017"/>
  <rect x="38.5" y="6"  width="2" height="8" fill="#d4a017"/>
  <rect x="41.5" y="6"  width="2" height="8" fill="#d4a017"/>
  <rect x="44.5" y="6"  width="2" height="8" fill="#d4a017"/>
  <rect x="47.5" y="6"  width="2" height="8" fill="#d4a017"/>

  <!-- Latch tab at bottom of port -->
  <rect x="31" y="19" width="14" height="2" fill="#888" rx="0.5"/>

  <!-- LED indicators (ACT/LINK) to the left of port -->
  <rect x="6"  y="7" width="6" height="4" fill="#1a1a1a" rx="0.5"/>
  <rect x="6" y="13" width="6" height="4" fill="#1a1a1a" rx="0.5"/>

  <!-- Label -->
  <text x="57" y="16" font-family="monospace" font-size="5" fill="#ccc" text-anchor="middle">MGMT</text>
</svg>
